<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Appointment' : 'Book New Appointment'">Appointment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="http://43.204.251.193:18080">
            <div class="brand-icon me-2"><i class="bi bi-heart-pulse-fill"></i></div>
            <div><span class="brand-name">HMS</span><span class="brand-sub d-none d-md-inline">Hospital Management System</span></div>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="http://43.204.251.193:18080"><i class="bi bi-house-fill me-1"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="http://43.204.251.193:8081/patients"><i class="bi bi-people-fill me-1"></i> Patients</a></li>
                <li class="nav-item"><a class="nav-link" href="http://43.204.251.193:8082/doctors"><i class="bi bi-person-badge-fill me-1"></i> Doctors</a></li>
                <li class="nav-item"><a class="nav-link active" href="/appointments"><i class="bi bi-calendar-check-fill me-1"></i> Appointments</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="bi bi-calendar-plus me-2" th:if="${!isEdit}"></i>
                        <i class="bi bi-pencil-square me-2" th:if="${isEdit}"></i>
                        <span th:text="${isEdit} ? 'Edit Appointment' : 'Book New Appointment'">Appointment Form</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="${isEdit} ? @{/appointments/update/{id}(id=${appointment.id})} : @{/appointments}" th:object="${appointment}" method="post">
                        <div class="mb-3">
                            <label for="patientId" class="form-label"><i class="bi bi-person-fill me-1" style="color:#60a5fa"></i> Patient <span class="text-danger">*</span></label>
                            <select class="form-select" id="patientId" th:field="*{patientId}" required>
                                <option value="">-- Select Patient --</option>
                                <option th:each="patient : ${patients}" th:value="${patient['id']}" th:text="${patient['name']}" th:selected="${appointment.patientId != null && appointment.patientId.toString() == patient['id'].toString()}">Patient Name</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('patientId')}" th:errors="*{patientId}">Patient error</div>
                        </div>
                        <div class="mb-3">
                            <label for="doctorId" class="form-label"><i class="bi bi-person-badge-fill me-1" style="color:#34d399"></i> Doctor <span class="text-danger">*</span></label>
                            <select class="form-select" id="doctorId" th:field="*{doctorId}" required>
                                <option value="">-- Select Doctor --</option>
                                <option th:each="doctor : ${doctors}" th:value="${doctor['id']}" th:text="${doctor['name'] + ' - ' + doctor['specialization']}" th:selected="${appointment.doctorId != null && appointment.doctorId.toString() == doctor['id'].toString()}">Doctor Name - Specialization</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}">Doctor error</div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="date" class="form-label"><i class="bi bi-calendar me-1" style="color:var(--accent-light)"></i> Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="date" th:field="*{date}" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date error</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="time" class="form-label"><i class="bi bi-clock me-1" style="color:#fbbf24"></i> Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="time" th:field="*{time}" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('time')}" th:errors="*{time}">Time error</div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label"><i class="bi bi-info-circle me-1"></i> Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="status" th:field="*{status}" required>
                                <option value="SCHEDULED" th:selected="${appointment.status == 'SCHEDULED'}">SCHEDULED</option>
                                <option value="COMPLETED" th:selected="${appointment.status == 'COMPLETED'}">COMPLETED</option>
                                <option value="CANCELLED" th:selected="${appointment.status == 'CANCELLED'}">CANCELLED</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Status error</div>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label"><i class="bi bi-journal-text me-1"></i> Notes</label>
                            <textarea class="form-control" id="notes" th:field="*{notes}" rows="3" placeholder="Enter any additional notes..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/appointments" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>
                                <span th:text="${isEdit} ? 'Update Appointment' : 'Book Appointment'">Submit</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer class="footer mt-5">
    <div class="container"><div class="row align-items-center">
        <div class="col-md-6"><div class="footer-brand"><i class="bi bi-heart-pulse-fill me-2"></i><strong>Hospital Management System</strong></div><p class="footer-text mt-2">Appointment Service v1.0.0</p></div>
        <div class="col-md-6 text-md-end"><p class="footer-text mb-0">&copy; 2026 Hospital Management System</p></div>
    </div></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
