version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: hospitaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresnew
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospitaldb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms-network

  patient-service:
    image: deep270804/hms-patient-service:latest
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgresnew
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - hms-network

  doctor-service:
    image: deep270804/hms-doctor-service:latest
    container_name: doctor-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgresnew
      SPRING_JPA_HIBERNATE_DDL_AUTO: update   
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s      
    networks:
      - hms-network

  appointment-service:
    image: deep270804/hms-appointment-service:latest
    container_name: appointment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgresnew
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PATIENT_SERVICE_URL: http://patient-service:8081
      DOCTOR_SERVICE_URL: http://doctor-service:8082
    depends_on:
      postgres-db:
        condition: service_healthy
      patient-service:
        condition: service_started
      doctor-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s      
    networks:
      - hms-network

  home-service:
    image: deep270804/hms-homeservice:latest
    container_name: home-service
    ports:
      - "18080:18080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgresnew
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PATIENT_SERVICE_URL: http://patient-service:8081
      DOCTOR_SERVICE_URL: http://doctor-service:8082
      APPOINTMENT_SERVICE_URL: http://appointment-service:8083
    depends_on:
      postgres-db:
        condition: service_healthy
      patient-service:
        condition: service_started
      doctor-service:
        condition: service_started
      appointment-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s      
    networks:
      - hms-network

volumes:
  postgres-data:

networks:
  hms-network:
    driver: bridge
