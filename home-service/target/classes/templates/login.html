<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hospital Management System - Secure Portal Login">
    <title>Login - Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
    <div class="login-background-glow"></div>
    
    <div class="login-card">
        <!-- Brand Header -->
        <div class="login-brand">
            <div class="brand-icon">
                <i class="bi bi-heart-pulse-fill"></i>
            </div>
            <h2>HMS Secure Portal</h2>
            <p>Sign in to access your dashboard</p>
        </div>

        <!-- Global Alert Messages (Username/Password errors, Logout info) -->
        <div th:if="${param.error}" class="alert-custom">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert-custom-success">
            <i class="bi bi-check-circle-fill"></i>
            <span>Successfully logged out.</span>
        </div>

        <div class="auth-form-container">
            <!-- Username & Password Login (Default Form Login) -->
            <div id="form-local" class="auth-form-step">
                <form th:action="@{/login}" method="post">
                    <div class="form-group-custom">
                        <label for="username">Username or Email</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="username" name="username" class="input-custom" placeholder="e.g. admin" required>
                            <i class="bi bi-person-fill"></i>
                        </div>
                    </div>
                    <div class="form-group-custom">
                        <label for="password">Password</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="password" name="password" class="input-custom" placeholder="••••••••" required>
                            <i class="bi bi-lock-fill"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-login-submit">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <small class="text-secondary">Demo logins: <strong class="text-white">admin / admin123</strong> or <strong class="text-white">user / user123</strong></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
