server:
  port: 8082

spring:
  application:
    name: doctor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hospitaldb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgresnew
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
